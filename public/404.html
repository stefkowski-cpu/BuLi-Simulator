<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>BuLi Simulator</title>
    <script>
      // GitHub Pages serves this file for any unknown path (e.g. a direct
      // load or reload of a client-side route like /matchdays/2). It encodes
      // the real path into a query string and redirects to the app root,
      // where the inline script in index.html restores it via history.replaceState.
      // Based on https://github.com/rafgraph/spa-github-pages
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
